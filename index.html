<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Agenda Profesional</title>

  <!-- PWA / iPhone -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agenda Profesional">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Iconos -->
  <link rel="apple-touch-icon" sizes="1024x1024" href="icono-1024.png">

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
      background:#020617;
      color:#fff;
    }

    .container{
      padding:16px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 15px;
      cursor:pointer;
    }

    .btn-primary{
      background:#fff;
      color:#000;
      font-weight:bold;
    }

    .btn-secondary{
      background:#22d3ee;
      color:#000;
    }

    .card{
      background:rgba(255,255,255,.05);
      padding:15px;
      border-radius:12px;
      margin-bottom:12px;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }

    .day-btn{
      padding:8px;
      border-radius:10px;
      background:#0f172a;
      border:1px solid #1e293b;
      cursor:pointer;
    }

    .day-btn.selected{
      border:2px solid #22d3ee;
    }

    .toast{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#000;
      padding:10px 15px;
      border-radius:10px;
      display:none;
    }

    .toast.show{
      display:block;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <h2>Agenda Profesional</h2>
      <div>
        <button class="btn btn-secondary" id="btnEnableNotifications">
          🔔 Activar push
        </button>
        <button class="btn btn-primary" id="btnOpenForm">
          + Evento
        </button>
      </div>
    </div>

    <!-- Calendario -->
    <div class="card">
      <div id="monthTitle"></div>
      <div id="daysHead"></div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <!-- Eventos del día -->
    <div class="card">
      <h3 id="selectedDateTitle">—</h3>
      <div id="dayEvents"></div>
    </div>

    <!-- Próximos -->
    <div class="card">
      <h3>Próximos eventos</h3>
      <div id="upcomingEvents"></div>
    </div>

  </div>

  <!-- Modal sencillo -->
  <div id="modalBackdrop" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);">
    <div style="background:#111; padding:20px; margin:40px; border-radius:10px;">
      
      <h3>Nuevo evento</h3>

      <input id="title" placeholder="Título" /><br><br>
      <input id="date" type="date"><br><br>
      <input id="startTime" type="time"><br><br>

      <button id="btnSave" class="btn btn-primary">Guardar</button>
      <button id="btnCancel" class="btn">Cancelar</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ✅ AQUÍ VA EL JS EXTERNO -->
  <script src="app.js"></script>

</body>
</html>
